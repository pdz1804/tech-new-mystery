name: App CI/CD

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "agent_core/**"
      - "infra/docker/**"
      - ".github/workflows/deploy.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "agent_core/**"
      - "infra/docker/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'tech-news-mystery-prod' }}
  BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY || 'tech-news-mystery-prod-backend' }}
  FRONTEND_ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY || 'tech-news-mystery-prod-frontend' }}
  AGENT_CORE_ECR_REPOSITORY: ${{ vars.AGENT_CORE_ECR_REPOSITORY || 'tech-news-mystery-prod-agent-core' }}
  AGENT_CORE_CODEBUILD_PROJECT: ${{ vars.AGENT_CORE_CODEBUILD_PROJECT || 'tech-news-mystery-prod-agent-core-arm64-image' }}
  AGENT_CORE_CODEBUILD_SOURCE_BUCKET: ${{ vars.AGENT_CORE_CODEBUILD_SOURCE_BUCKET || 'tech-news-mystery-prod-codebuild-sources-381492273521' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || '/v1' }}

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall app

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run type-check

      - name: Test frontend
        run: npm test -- --runInBand

      - name: Build frontend
        run: npm run build

  agent-core-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent-core dependencies
        run: pip install -r agent_core/requirements.txt

      - name: Compile agent-core
        run: python -m compileall agent_core

      - name: Run agent-core unit tests
        env:
          PYTHONPATH: .
        run: python -m pytest agent_core/tests/ -v --tb=short

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs:
      - backend-checks
      - frontend-checks
      - agent-core-checks
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image (for api, worker, beat services)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f infra/docker/backend.Dockerfile -t "$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG" backend
          docker tag "$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest"

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" -f frontend/Dockerfile -t "$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG" frontend
          docker tag "$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest"

      - name: Build and push agent-core image
        run: |
          git archive --format=zip --output source.zip HEAD
          aws s3 cp source.zip "s3://$AGENT_CORE_CODEBUILD_SOURCE_BUCKET/agent-core/source.zip"

          BUILD_ID=$(aws codebuild start-build \
            --project-name "$AGENT_CORE_CODEBUILD_PROJECT" \
            --environment-variables-override name=IMAGE_TAG,value=${{ github.sha }},type=PLAINTEXT \
            --query 'build.id' \
            --output text)

          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' \
              --output text)

            case "$STATUS" in
              SUCCEEDED) break ;;
              FAILED|FAULT|STOPPED|TIMED_OUT) exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - name: Force ECS rollout
        run: |
          aws ecs update-service --cluster "$ECS_CLUSTER" --service api --force-new-deployment
          aws ecs update-service --cluster "$ECS_CLUSTER" --service frontend --force-new-deployment
          aws ecs update-service --cluster "$ECS_CLUSTER" --service worker --force-new-deployment
          aws ecs update-service --cluster "$ECS_CLUSTER" --service beat --force-new-deployment

      - name: Wait for ECS services
        run: |
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services api frontend worker beat
