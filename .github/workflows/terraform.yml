name: Terraform Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-state-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  TF_VERSION: 1.6.1
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'tech-news-mystery-tfstate-381492273521' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'terraform.tfstate' }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE || 'tech-news-mystery-terraform-locks' }}
  BACKEND_IMAGE_TAG: ${{ vars.BACKEND_IMAGE_TAG || 'latest' }}
  FRONTEND_IMAGE_TAG: ${{ vars.FRONTEND_IMAGE_TAG || 'latest' }}
  AGENT_CORE_IMAGE_TAG: ${{ vars.AGENT_CORE_IMAGE_TAG || 'latest' }}
  GITHUB_ACTIONS_ROLE_NAME: ${{ vars.GITHUB_ACTIONS_ROLE_NAME || 'github-actions-tech-news-mystery' }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    outputs:
      plan-exists: ${{ steps.plan.outcome == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap Terraform Autoscaling Permissions
        run: |
          cat > /tmp/github-actions-autoscaling-policy.json <<'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "ApplicationAutoscalingBootstrap",
                "Effect": "Allow",
                "Action": [
                  "application-autoscaling:*"
                ],
                "Resource": "*"
              }
            ]
          }
          JSON

          aws iam put-role-policy \
            --role-name "$GITHUB_ACTIONS_ROLE_NAME" \
            --policy-name "tech-news-mystery-prod-github-autoscaling-bootstrap" \
            --policy-document file:///tmp/github-actions-autoscaling-policy.json

          sleep 30

      - name: Clear Terraform Working Directory
        working-directory: infra/terraform
        run: rm -rf .terraform

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      - id: plan
        name: Terraform Plan
        working-directory: infra/terraform
        run: |
          set -o pipefail
          terraform plan \
            -lock-timeout=5m \
            -var="backend_image_tag=$BACKEND_IMAGE_TAG" \
            -var="frontend_image_tag=$FRONTEND_IMAGE_TAG" \
            -var="agent_core_image_tag=$AGENT_CORE_IMAGE_TAG" \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "Plan generated"

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/plan.txt', 'utf8');
            const output = `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  terraform-apply:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: terraform-plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clear Terraform Working Directory
        working-directory: infra/terraform
        run: rm -rf .terraform

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Import Existing Production Resources
        working-directory: infra/terraform
        env:
          REGION: ${{ env.AWS_REGION }}
          S3_BUCKET: ${{ vars.S3_BUCKET_NAME || 'tech-news-articles-381492273521' }}
          TABLE_PREFIX: ${{ vars.DYNAMODB_TABLE_PREFIX || 'tech-news-' }}
          NAME_PREFIX: ${{ vars.TF_NAME_PREFIX || 'tech-news-mystery-prod' }}
          CODEBUILD_SOURCE_BUCKET: ${{ vars.AGENT_CORE_CODEBUILD_SOURCE_BUCKET || 'tech-news-mystery-prod-codebuild-sources-381492273521' }}
        run: bash scripts/import-existing.sh

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply \
            -lock-timeout=5m \
            -auto-approve \
            -var="backend_image_tag=$BACKEND_IMAGE_TAG" \
            -var="frontend_image_tag=$FRONTEND_IMAGE_TAG" \
            -var="agent_core_image_tag=$AGENT_CORE_IMAGE_TAG"

      - name: Export Outputs
        working-directory: infra/terraform
        run: terraform output -json > outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: infra/terraform/outputs.json
          retention-days: 7
