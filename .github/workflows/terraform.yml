name: Terraform Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  TF_VERSION: 1.6.0

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    outputs:
      plan-exists: ${{ steps.plan.outcome == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clear Terraform Cache
        working-directory: infra/terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=tech-news-mystery-tfstate-381492273521" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-west-2" \
            -backend-config="dynamodb_table=tech-news-mystery-terraform-locks"

      - name: Terraform Format Check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      - id: plan
        name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "Plan generated"

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/plan.txt', 'utf8');
            const output = `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  terraform-apply:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: terraform-plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clear Terraform Cache
        working-directory: infra/terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=tech-news-mystery-tfstate-381492273521" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-west-2" \
            -backend-config="dynamodb_table=tech-news-mystery-terraform-locks"

      - name: Terraform Plan (for verification)
        working-directory: infra/terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Export Outputs
        working-directory: infra/terraform
        run: terraform output -json > outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: infra/terraform/outputs.json
          retention-days: 7
