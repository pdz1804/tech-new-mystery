services:
  # FastAPI Backend
  api:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: tech-news-api
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    environment:
      AWS_REGION: us-west-2
      ENVIRONMENT: local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Agent Core Runtime (AWS Bedrock AgentCore + LangGraph)
  agent-core:
    build:
      context: ..
      dockerfile: infra/docker/agent-core.Dockerfile
    container_name: tech-news-agent-core
    ports:
      - "8080:8080"
    volumes:
      - ../agent_core:/app/agent_core
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: local
      AWS_REGION: us-west-2
      BEDROCK_REGION: us-west-2
      AGENT_MODEL: us.anthropic.claude-haiku-4-5-20251001-v1:0
      QDRANT_MODE: cloud
      TOOL_TIMEOUT: "30"
      BROWSER_TIMEOUT: "60"
      CODE_INTERPRETER_TIMEOUT: "60"
      BROWSER_IDENTIFIER: aws.browser.v1
      CODE_INTERPRETER_IDENTIFIER: aws.codeinterpreter.v1
      MAX_SEARCH_RESULTS: "8"
      # MEMORY_ID: set to your AWS Bedrock AgentCore Memory ID after provisioning
      # AGENT_CORE_API_KEY: shared secret for backend→agent-core auth
    # BedrockAgentCoreApp exposes /ping not /health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Celery Worker
  celery-worker:
    build:
      context: ../backend
      dockerfile: ../infra/docker/celery.Dockerfile
    container_name: tech-news-celery-worker
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    environment:
      AWS_REGION: us-west-2
      ENVIRONMENT: local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=6

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ../backend
      dockerfile: ../infra/docker/celery.Dockerfile
    container_name: tech-news-celery-beat
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    environment:
      AWS_REGION: us-west-2
      ENVIRONMENT: local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: tech-news-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/v1
      NODE_ENV: development
    depends_on:
      - api
    command: npm run dev

  # Redis Cache & Message Broker
  redis:
    image: redis:7.4-alpine
    container_name: tech-news-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:

networks:
  default:
    name: tech-news-network
